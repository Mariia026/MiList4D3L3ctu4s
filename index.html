<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Biblioteca</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="auth" class="center">
  <h2>📚 Mi Biblioteca</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Iniciar sesión</button>
</div>

<div id="app" style="display:none;">
  
  <header>
    <h1>📚 Mi Biblioteca</h1>
    <button onclick="logout()">Salir</button>
  </header>

  <input type="text" id="buscador" placeholder="🔍 Buscar..." oninput="filtrar()">

  <div id="biblioteca" class="grid"></div>

  <button class="fab" onclick="abrirForm()">+</button>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h3>Agregar libro</h3>
      <input type="text" id="nombre" placeholder="Nombre">
      <input type="text" id="imagen" placeholder="URL imagen">
      <button onclick="agregarLibro()">Guardar</button>
      <button onclick="cerrarForm()">Cancelar</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="assets/js/app.js"></script>

</body>
</html>
